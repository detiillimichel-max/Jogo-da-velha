<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELHA.EXE</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cyan: #00f5ff;
      --orange: #ff6b00;
      --pink: #ff0080;
      --bg: #050810;
      --surface: #0a0f1e;
      --border: rgba(0, 245, 255, 0.2);
      --x-color: #00f5ff;
      --o-color: #ff6b00;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--cyan);
      text-shadow:
        0 0 10px var(--cyan),
        0 0 30px var(--cyan),
        0 0 60px rgba(0,245,255,0.4);
      animation: flicker 4s infinite;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: rgba(0,245,255,0.5);
      margin-top: 4px;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
      98% { opacity: 0.5; }
      99% { opacity: 1; }
    }

    /* Status bar */
    .status-bar {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.8rem, 3vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 10px 28px;
      border: 1px solid var(--border);
      background: rgba(0,245,255,0.05);
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      text-align: center;
      min-width: 260px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .status-bar::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.1), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      to { left: 200%; }
    }

    .status-bar.x-turn { color: var(--x-color); border-color: rgba(0,245,255,0.4); }
    .status-bar.o-turn { color: var(--o-color); border-color: rgba(255,107,0,0.4); }
    .status-bar.win-x  { color: var(--x-color); border-color: var(--x-color); text-shadow: 0 0 20px var(--x-color); }
    .status-bar.win-o  { color: var(--o-color); border-color: var(--o-color); text-shadow: 0 0 20px var(--o-color); }
    .status-bar.draw   { color: var(--pink);    border-color: var(--pink);    text-shadow: 0 0 20px var(--pink); }

    /* Score board */
    .scoreboard {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .score-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.4);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      min-width: 80px;
    }

    .score-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }

    .score-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .score-card.x .score-value { color: var(--x-color); text-shadow: 0 0 15px var(--x-color); }
    .score-card.o .score-value { color: var(--o-color); text-shadow: 0 0 15px var(--o-color); }
    .score-card.draws .score-value { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

    .score-sep {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      opacity: 0.3;
    }

    /* Game board */
    .board-wrapper {
      position: relative;
    }

    .board-wrapper::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(45deg, var(--cyan), transparent, var(--orange), transparent, var(--cyan));
      border-radius: 4px;
      z-index: -1;
      opacity: 0.4;
      animation: borderRotate 4s linear infinite;
    }

    @keyframes borderRotate {
      to { filter: hue-rotate(360deg); }
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      background: rgba(0,245,255,0.15);
      padding: 3px;
      border: 1px solid var(--border);
    }

    .cell {
      width: clamp(90px, 26vw, 120px);
      height: clamp(90px, 26vw, 120px);
      background: var(--surface);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 9vw, 3rem);
      font-weight: 900;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,245,255,0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .cell:hover:not(.taken) { background: rgba(0,245,255,0.07); }
    .cell:hover:not(.taken)::before { opacity: 1; }

    .cell.taken { cursor: default; }

    .cell .mark {
      display: block;
      animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .cell .mark.x {
      color: var(--x-color);
      text-shadow: 0 0 20px var(--x-color), 0 0 40px rgba(0,245,255,0.5);
    }

    .cell .mark.o {
      color: var(--o-color);
      text-shadow: 0 0 20px var(--o-color), 0 0 40px rgba(255,107,0,0.5);
    }

    .cell.winner {
      background: rgba(0,245,255,0.1);
      animation: winPulse 0.8s ease infinite alternate;
    }

    .cell.winner.o-win {
      background: rgba(255,107,0,0.1);
      animation: winPulseO 0.8s ease infinite alternate;
    }

    @keyframes winPulse  { to { background: rgba(0,245,255,0.2); } }
    @keyframes winPulseO { to { background: rgba(255,107,0,0.2); } }

    /* Buttons */
    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--cyan);
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: rgba(0,245,255,0.1);
      border-color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
      box-shadow: 0 0 15px rgba(0,245,255,0.2);
    }

    .btn.danger {
      border-color: rgba(255,0,128,0.3);
      color: var(--pink);
    }
    .btn.danger:hover {
      background: rgba(255,0,128,0.1);
      border-color: var(--pink);
      text-shadow: 0 0 10px var(--pink);
      box-shadow: 0 0 15px rgba(255,0,128,0.2);
    }

    /* Victory overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(5,8,16,0.85);
      backdrop-filter: blur(4px);
    }
    .overlay.show { display: flex; }

    .overlay-card {
      text-align: center;
      padding: 40px;
      border: 1px solid var(--cyan);
      background: var(--surface);
      clip-path: polygon(20px 0%, 100% 0%, calc(100% - 20px) 100%, 0% 100%);
      box-shadow: 0 0 40px rgba(0,245,255,0.2), inset 0 0 40px rgba(0,245,255,0.05);
      animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .overlay-card.o-win {
      border-color: var(--orange);
      box-shadow: 0 0 40px rgba(255,107,0,0.2), inset 0 0 40px rgba(255,107,0,0.05);
    }

    .overlay-card.draw-card {
      border-color: var(--pink);
      box-shadow: 0 0 40px rgba(255,0,128,0.2);
    }

    @keyframes slideIn {
      from { transform: scale(0.6) translateY(30px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .overlay-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .overlay-sub {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      opacity: 0.5;
      margin-bottom: 28px;
    }

    .overlay-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 12px 32px;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .overlay-btn:hover {
      background: rgba(0,245,255,0.15);
      box-shadow: 0 0 20px rgba(0,245,255,0.3);
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      opacity: 0.3;
    }
    .corner.tl { top: 20px; left: 20px;  border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .corner.tr { top: 20px; right: 20px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
    .corner.bl { bottom: 20px; left: 20px;  border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .corner.br { bottom: 20px; right: 20px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <div class="header">
      <h1 class="title">VELHA.EXE</h1>
      <p class="subtitle">// JOGO DA VELHA // v1.0.0</p>
    </div>

    <div class="scoreboard">
      <div class="score-card x">
        <span class="score-label">JOGADOR X</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <span class="score-sep">vs</span>
      <div class="score-card draws">
        <span class="score-label">EMPATES</span>
        <span class="score-value" id="score-d">0</span>
      </div>
      <span class="score-sep">vs</span>
      <div class="score-card o">
        <span class="score-label">JOGADOR O</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <div class="status-bar x-turn" id="status">// TURNO DE X //</div>

    <div class="board-wrapper">
      <div class="board" id="board">
        <button class="cell" data-i="0"><span class="mark"></span></button>
        <button class="cell" data-i="1"><span class="mark"></span></button>
        <button class="cell" data-i="2"><span class="mark"></span></button>
        <button class="cell" data-i="3"><span class="mark"></span></button>
        <button class="cell" data-i="4"><span class="mark"></span></button>
        <button class="cell" data-i="5"><span class="mark"></span></button>
        <button class="cell" data-i="6"><span class="mark"></span></button>
        <button class="cell" data-i="7"><span class="mark"></span></button>
        <button class="cell" data-i="8"><span class="mark"></span></button>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btn-new">[ NOVA PARTIDA ]</button>
      <button class="btn danger" id="btn-reset">[ RESETAR PLACAR ]</button>
    </div>
  </div>

  <!-- Victory overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-card" id="overlay-card">
      <p class="overlay-title" id="overlay-title">VITÓRIA!</p>
      <p class="overlay-sub" id="overlay-sub">JOGADOR X VENCEU</p>
      <button class="overlay-btn" id="overlay-btn">[ JOGAR NOVAMENTE ]</button>
    </div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, D: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const overlay = document.getElementById('overlay');
    const overlayCard  = document.getElementById('overlay-card');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub   = document.getElementById('overlay-sub');
    const scoreX  = document.getElementById('score-x');
    const scoreO  = document.getElementById('score-o');
    const scoreD  = document.getElementById('score-d');

    // Audio
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq, dur, type = 'square', vol = 0.3) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start();
      osc.stop(ctx.currentTime + dur);
    }

    function playMove(player) {
      if (player === 'X') beep(440, 0.1);
      else beep(300, 0.1);
    }

    function playWin() {
      [523, 659, 784, 1047].forEach((f, i) =>
        setTimeout(() => beep(f, 0.2, 'square', 0.4), i * 80));
    }

    function playDraw() {
      [300, 250, 200].forEach((f, i) =>
        setTimeout(() => beep(f, 0.15, 'sawtooth', 0.3), i * 100));
    }

    function setStatus(text, cls) {
      status.textContent = text;
      status.className = 'status-bar ' + cls;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], combo: [a, b, c] };
      }
      if (board.every(Boolean)) return { winner: 'DRAW' };
      return null;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (ctx.state === 'suspended') ctx.resume();

      board[i] = current;
      const cell = cells[i];
      const mark = cell.querySelector('.mark');
      mark.textContent = current;
      mark.className = 'mark ' + current.toLowerCase();
      cell.classList.add('taken');

      playMove(current);

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'DRAW') {
          scores.D++;
          scoreD.textContent = scores.D;
          setStatus('// EMPATE //', 'draw');
          playDraw();
          showOverlay('EMPATE', 'NENHUM VENCEDOR', 'draw-card');
        } else {
          const isX = result.winner === 'X';
          scores[result.winner]++;
          if (isX) scoreX.textContent = scores.X;
          else     scoreO.textContent = scores.O;
          result.combo.forEach(idx => {
            cells[idx].classList.add('winner');
            if (!isX) cells[idx].classList.add('o-win');
          });
          setStatus(`// JOGADOR ${result.winner} VENCEU //`, isX ? 'win-x' : 'win-o');
          playWin();
          showOverlay('VITÓRIA!', `JOGADOR ${result.winner} VENCEU`, isX ? '' : 'o-win');
        }
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`// TURNO DE ${current} //`, current === 'X' ? 'x-turn' : 'o-turn');
    }

    function showOverlay(title, sub, cardClass) {
      overlayTitle.textContent = title;
      overlaySub.textContent = sub;
      overlayCard.className = 'overlay-card ' + cardClass;
      setTimeout(() => overlay.classList.add('show'), 600);
    }

    function newGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.classList.remove('taken', 'winner', 'o-win');
        c.querySelector('.mark').textContent = '';
        c.querySelector('.mark').className = 'mark';
      });
      overlay.classList.remove('show');
      setStatus('// TURNO DE X //', 'x-turn');
    }

    function resetScores() {
      scores = { X: 0, O: 0, D: 0 };
      scoreX.textContent = 0;
      scoreO.textContent = 0;
      scoreD.textContent = 0;
      newGame();
    }

    cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));
    document.getElementById('btn-new').addEventListener('click', newGame);
    document.getElementById('btn-reset').addEventListener('click', resetScores);
    document.getElementById('overlay-btn').addEventListener('click', newGame);
  </script>
</body>
  </html>
